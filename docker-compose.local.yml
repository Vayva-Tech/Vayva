version: '3.8'

# ============================================================================
# LOCAL ML INFRASTRUCTURE - FOR TESTING ON MAC
# Deploy complete ML stack locally before VPS upgrade
# ============================================================================

services:
  # ============================================================================
  # Ollama - Local LLM Inference Server
  # ============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: vayva-ollama-local
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_local:/root/.ollama
    environment:
      - OLLAMA_MODELS=/root/.ollama/models
    deploy:
      resources:
        limits:
          memory: 10G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - vayva-local

  # ============================================================================
  # Qdrant - Vector Database
  # ============================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vayva-qdrant-local
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_local:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - vayva-local

  # ============================================================================
  # Embedding Service - FastAPI + BGE-M3
  # ============================================================================
  embedding-service:
    build:
      context: ./apps/ml-embeddings
      dockerfile: Dockerfile
    container_name: vayva-embedding-local
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MODEL_NAME=BAAI/bge-m3
      - PORT=8001
      - DEVICE=cpu
    depends_on:
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - vayva-local

  # ============================================================================
  # Neo4j - Graph Database
  # ============================================================================
  neo4j:
    image: neo4j:5-community
    container_name: vayva-neo4j-local
    restart: unless-stopped
    ports:
      - "7474:7474"  # Browser
      - "7687:7687"  # Bolt protocol
    volumes:
      - neo4j_local:/data
    environment:
      - NEO4J_AUTH=neo4j/local_password_123
      - NEO4J_dbms_memory_heap_initial__size=2G
      - NEO4J_dbms_memory_heap_max__size=4G
    deploy:
      resources:
        limits:
          memory: 6G
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - vayva-local

networks:
  vayva-local:
    driver: bridge

volumes:
  ollama_local:
    driver: local
  qdrant_local:
    driver: local
  neo4j_local:
    driver: local
