apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vayva

resources:
- namespace.yaml
- configmap.yaml
- secret.yaml
- deployment.yaml
- service.yaml
- ingress.yaml
- hpa.yaml
- rbac.yaml
- pdb.yaml
- network-policy.yaml

commonLabels:
  app.kubernetes.io/name: vayva
  app.kubernetes.io/component: api
  app.kubernetes.io/managed-by: kustomize

images:
- name: vayva/api
  newTag: latest
