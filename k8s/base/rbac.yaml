apiVersion: v1
kind: ServiceAccount
metadata:
  name: vayva-api
  namespace: vayva
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/vayva-api-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vayva-api
  namespace: vayva
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["vayva-secrets"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vayva-api
  namespace: vayva
subjects:
- kind: ServiceAccount
  name: vayva-api
  namespace: vayva
roleRef:
  kind: Role
  name: vayva-api
  apiGroup: rbac.authorization.k8s.io
