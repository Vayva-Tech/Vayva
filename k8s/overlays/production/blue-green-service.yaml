apiVersion: v1
kind: Service
metadata:
  name: vayva-api-active
  namespace: vayva-production
  labels:
    app: vayva-api
    slot: active
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: vayva-api
    slot: active
---
# Blue-Green Deployment Controller
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vayva-api-green
  namespace: vayva-production
  labels:
    app: vayva-api
    version: green
    slot: inactive
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vayva-api
      version: green
  template:
    metadata:
      labels:
        app: vayva-api
        version: green
        slot: inactive
    spec:
      serviceAccountName: production-vayva-api
      containers:
      - name: api
        image: vayva/api:v1.2.3-green
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3000
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "4000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
