apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vayva-production

resources:
- ../../base
- blue-green-service.yaml

namePrefix: production-

commonLabels:
  environment: production
  version: blue

replicas:
- name: vayva-api
  count: 5

images:
- name: vayva/api
  newTag: v1.2.3

patchesStrategicMerge:
- deployment-patch.yaml
- hpa-patch.yaml

configMapGenerator:
- name: vayva-config
  behavior: merge
  literals:
  - NODE_ENV=production
  - LOG_LEVEL=warn
  - ENABLE_METRICS=true
