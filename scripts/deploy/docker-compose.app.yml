services:
  # ---------- Cache ----------
  redis:
    image: redis:7-alpine
    container_name: vayva-redis
    command: redis-server --port 6379 --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - vayva

  # ---------- WhatsApp API Engine (Evolution API) ----------
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: vayva-evolution
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    restart: always
    networks:
      - vayva

  # ---------- Object Storage (MinIO) ----------
  minio:
    image: minio/minio:latest
    container_name: vayva-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vayva-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - vayva

  # ---------- Reverse Proxy & SSL ----------
  proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: vayva-proxy
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - proxy_data:/data
      - proxy_letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - vayva

volumes:
  redis_data:
  evolution_instances:
  minio_data:
  proxy_data:
  proxy_letsencrypt:

networks:
  vayva:
    driver: bridge
