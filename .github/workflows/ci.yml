name: CI - Tests & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vayva
          POSTGRES_PASSWORD: test
          POSTGRES_DB: vayva_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run type check
        run: pnpm typecheck

      # Run all tests via turbo
      - name: Run unit tests (turbo)
        run: pnpm turbo test
        env:
          DATABASE_URL: postgresql://vayva:test@localhost:5432/vayva_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      # Backend Core API Tests (legacy, will be covered by turbo)
      - name: Test Backend Core API
        working-directory: ./Backend/core-api
        run: |
          pnpm test -- --coverage
        env:
          DATABASE_URL: postgresql://vayva:test@localhost:5432/vayva_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      # Frontend Merchant Admin Tests
      - name: Test Frontend Merchant Admin
        working-directory: ./Frontend/merchant-admin
        run: |
          pnpm run test:coverage -- --coverage.thresholds.lines=70 --coverage.thresholds.functions=70
        env:
          NEXT_PUBLIC_API_URL: https://api.vayva.ng
          BACKEND_API_URL: https://api.vayva.ng

      # Worker Tests
      - name: Test Worker
        working-directory: ./apps/worker
        run: |
          pnpm test
        env:
          DATABASE_URL: postgresql://vayva:test@localhost:5432/vayva_test
          REDIS_URL: redis://localhost:6379

      # Ops Console Tests
      - name: Test Ops Console
        working-directory: ./Frontend/ops-console
        run: |
          pnpm run type-check

      # Upload coverage to Codecov (optional)
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: >
            ./Backend/core-api/coverage/lcov.info,
            ./Frontend/merchant-admin/coverage/lcov.info,
            ./apps/worker/coverage/lcov.info
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm exec playwright install chromium

      - name: Run E2E tests
        working-directory: ./Frontend/merchant-admin
        run: pnpm exec playwright test --project=chromium
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: playwright-report
          path: ./Frontend/merchant-admin/playwright-report/
          retention-days: 7

  security-audit:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: |
          pnpm audit --audit-level=high || true

      - name: Check for high/critical vulnerabilities
        run: |
          pnpm audit --audit-level=high 2>&1 | grep -E "(High|Critical)" && exit 1 || echo "No high/critical vulnerabilities found"
