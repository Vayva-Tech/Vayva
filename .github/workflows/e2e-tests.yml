name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-merchant:
    name: Merchant Admin E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vayva_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        name: Install pnpm
        with:
          version: 10.2.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: Frontend/merchant

      - name: Generate Prisma Client
        run: pnpm --filter @vayva/db db:generate

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vayva_test
        run: |
          pnpm --filter @vayva/db db:push
          pnpm --filter @vayva/db exec prisma db seed

      - name: Create E2E test user
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d vayva_test -c "
            INSERT INTO \"User\" (id, email, \"firstName\", \"lastName\", password, \"isEmailVerified\", \"createdAt\", \"updatedAt\")
            VALUES ('e2e-user-1', 'e2e-merchant@vayva.test', 'E2E', 'Merchant', '\$2b\$10\$abcdefghijklmnopqrstuuABCDEFGHIJKLMNOPQRSTUVWXYZ012', true, NOW(), NOW())
            ON CONFLICT (email) DO NOTHING;
            INSERT INTO \"Store\" (id, name, slug, \"onboardingCompleted\", \"onboardingStatus\", \"isLive\", \"createdAt\", \"updatedAt\")
            VALUES ('e2e-store-1', 'E2E Test Store', 'e2e-test-store', true, 'COMPLETE', true, NOW(), NOW())
            ON CONFLICT (slug) DO NOTHING;
            INSERT INTO \"Membership\" (id, \"userId\", \"storeId\", role_enum, status, \"createdAt\", \"updatedAt\")
            VALUES ('e2e-membership-1', 'e2e-user-1', 'e2e-store-1', 'OWNER', 'ACTIVE', NOW(), NOW())
            ON CONFLICT (\"userId\", \"storeId\") DO NOTHING;
          "

      - name: Build merchant
        run: pnpm --filter merchant build
        env:
          NODE_ENV: test
          CI: "true"
          VAYVA_E2E_MODE: "true"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vayva_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-key-for-ci
          NEXTAUTH_URL: http://localhost:3000
          BACKEND_API_URL: https://api.vayva.ng
          MERCHANT_ORIGIN: http://localhost:3000
          MARKETING_ORIGIN: http://localhost:3000
          OPS_ORIGIN: http://localhost:3000
          PAYSTACK_SECRET_KEY: sk_test_ci_placeholder
          NEXT_PUBLIC_PAYSTACK_KEY: pk_test_ci_placeholder
          RESEND_API_KEY: re_ci_placeholder
          RESEND_FROM_EMAIL: ci@vayva.test

      - name: Run E2E tests
        # continue-on-error removed - failures now block merges
        run: pnpm --filter merchant playwright test
        env:
          NODE_ENV: test
          CI: "true"
          VAYVA_E2E_MODE: "true"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vayva_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-key-for-ci
          NEXTAUTH_URL: http://localhost:3000
          BACKEND_API_URL: https://api.vayva.ng
          MERCHANT_ORIGIN: http://localhost:3000
          MARKETING_ORIGIN: http://localhost:3000
          OPS_ORIGIN: http://localhost:3000
          PAYSTACK_SECRET_KEY: sk_test_ci_placeholder
          NEXT_PUBLIC_PAYSTACK_KEY: pk_test_ci_placeholder
          RESEND_API_KEY: re_ci_placeholder
          RESEND_FROM_EMAIL: ci@vayva.test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Frontend/merchant/playwright-report/
          retention-days: 7

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: Frontend/merchant/test-results/
          retention-days: 7

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'Frontend/merchant/playwright-report/index.html';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ E2E tests failed. Check the [test report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            });
