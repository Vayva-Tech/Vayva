name: Ops Security Guard

on: [push, pull_request]

jobs:
  tripwires:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Tripwire - Merchant Admin Platform Leakage
        run: |
          for root in apps/merchant/src Frontend/merchant/src; do
            if [ -d "$root" ]; then
              if grep -r "src/app/admin" "$root/app" --include="*.ts" --include="*.tsx" 2>/dev/null; then
                echo "FAIL: Found legacy admin routes in $root"
                exit 1
              fi
              if grep -r "/api/admin/ops" "$root" --include="*.ts" --include="*.tsx" 2>/dev/null; then
                echo "FAIL: Found legacy ops api calls in $root"
                exit 1
              fi
            fi
          done

      - name: Tripwire - Ops console API route auth (Frontend/ops-console)
        run: bash Frontend/ops-console/scripts/verify-api-route-auth.sh

      - name: Tripwire - Domain Safety
        run: |
          # Fail if new .com references are introduced in code (exclude docs if needed)
          if grep -r "vayva.com" apps/merchant/src --include=*.ts --include=*.tsx; then
            echo "FAIL: Found vayva.com references in merchant source"
            exit 1
          fi
