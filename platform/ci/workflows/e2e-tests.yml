name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-merchant:
    name: Merchant Admin E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vayva_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        name: Install pnpm
        with:
          version: 10.2.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: Frontend/merchant

      - name: Generate Prisma Client
        run: pnpm --dir infra/db db:generate

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vayva_test
        run: |
          pnpm --dir infra/db db:push
          pnpm --dir infra/db exec tsx prisma/seed-e2e.ts

      - name: Build merchant
        run: pnpm --filter merchant build
        env:
          NODE_ENV: test
          CI: "true"
          VAYVA_E2E_MODE: "true"
          VAYVA_E2E_TARGET: "merchant"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vayva_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-key-for-ci
          NEXTAUTH_URL: http://localhost:3000
          MERCHANT_ORIGIN: http://localhost:3000
          MARKETING_ORIGIN: http://localhost:3000
          OPS_ORIGIN: http://localhost:3000
          PAYSTACK_SECRET_KEY: sk_test_ci_placeholder
          NEXT_PUBLIC_PAYSTACK_KEY: pk_test_ci_placeholder
          RESEND_API_KEY: re_ci_placeholder
          RESEND_FROM_EMAIL: ci@vayva.test

      - name: Run Smoke E2E (merchant)
        run: pnpm test:e2e -- --grep "@smoke.*@merchant|@merchant.*@smoke"
        env:
          NODE_ENV: test
          CI: "true"
          VAYVA_E2E_MODE: "true"
          VAYVA_E2E_TARGET: "merchant"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vayva_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-key-for-ci
          NEXTAUTH_URL: http://localhost:3000
          MERCHANT_ORIGIN: http://localhost:3000
          MARKETING_ORIGIN: http://localhost:3000
          OPS_ORIGIN: http://localhost:3000
          PAYSTACK_SECRET_KEY: sk_test_ci_placeholder
          NEXT_PUBLIC_PAYSTACK_KEY: pk_test_ci_placeholder
          RESEND_API_KEY: re_ci_placeholder
          RESEND_FROM_EMAIL: ci@vayva.test

      - name: Run Full E2E (merchant)
        run: pnpm test:e2e -- --grep "@merchant" --grep-invert "@smoke"
        env:
          NODE_ENV: test
          CI: "true"
          VAYVA_E2E_MODE: "true"
          VAYVA_E2E_TARGET: "merchant"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vayva_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-key-for-ci
          NEXTAUTH_URL: http://localhost:3000
          MERCHANT_ORIGIN: http://localhost:3000
          MARKETING_ORIGIN: http://localhost:3000
          OPS_ORIGIN: http://localhost:3000
          PAYSTACK_SECRET_KEY: sk_test_ci_placeholder
          NEXT_PUBLIC_PAYSTACK_KEY: pk_test_ci_placeholder
          RESEND_API_KEY: re_ci_placeholder
          RESEND_FROM_EMAIL: ci@vayva.test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merchant
          path: playwright-report/
          retention-days: 7

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos-merchant
          path: test-results/
          retention-days: 7

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'Frontend/merchant/playwright-report/index.html';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ E2E tests failed. Check the [test report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            });

