        working-directory: Frontend/storefront

      - name: Generate Prisma Client
        run: pnpm --dir infra/db db:generate

      - name: Setup staging test database
        env:
          DATABASE_URL: ${{ secrets.STAGING_TEST_DATABASE_URL }}
        run: |
          pnpm --dir infra/db db:push
          pnpm --dir infra/db exec tsx prisma/seed-e2e.ts

      - name: Build storefront
