services:
  # ---------- Cache ----------
  redis:
    image: redis:7-alpine
    container_name: vayva-redis
    command: redis-server --port 6379 --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - vayva
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ---------- WhatsApp API Engine (Evolution API) ----------
  evolution-api:
    image: evoapicloud/evolution-api:v2.2.3
    container_name: vayva-evolution
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      # Ensure these critical vars are always set
      - NODE_ENV=production
      - SERVER_PORT=8080
    volumes:
      - evolution_instances:/evolution/instances
    restart: always
    healthcheck:
      # Evolution API v2.x doesn't have /health - use root endpoint
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - vayva
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ---------- Object Storage (MinIO) ----------
  minio:
    image: minio/minio:latest
    container_name: vayva-minio
    profiles: ["minio-container"]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vayva-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - vayva

  # ---------- Reverse Proxy & SSL ----------
  proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: vayva-proxy
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - proxy_data:/data
      - proxy_letsencrypt:/etc/letsencrypt
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:81/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - vayva
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  redis_data:
  evolution_instances:
  minio_data:
  proxy_data:
  proxy_letsencrypt:

networks:
  vayva:
    driver: bridge
