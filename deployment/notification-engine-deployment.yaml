apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-engine
  namespace: vayva-production
  labels:
    app: notification-engine
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: notification-engine
  template:
    metadata:
      labels:
        app: notification-engine
        tier: backend
    spec:
      containers:
      - name: notification-engine
        image: vayva/notification-engine:latest
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: vayva-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: vayva-secrets
              key: redis-url
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: vayva-secrets
              key: smtp-host
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: vayva-secrets
              key: smtp-port
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: vayva-secrets
              key: smtp-user
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: vayva-secrets
              key: smtp-pass
        - name: TWILIO_ACCOUNT_SID
          valueFrom:
            secretKeyRef:
              name: vayva-secrets
              key: twilio-account-sid
        - name: TWILIO_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: vayva-secrets
              key: twilio-auth-token
        - name: TWILIO_PHONE_NUMBER
          valueFrom:
            secretKeyRef:
              name: vayva-secrets
              key: twilio-phone-number
        - name: FCM_SERVER_KEY
          valueFrom:
            secretKeyRef:
              name: vayva-secrets
              key: fcm-server-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: notification-engine-service
  namespace: vayva-production
spec:
  selector:
    app: notification-engine
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-engine-hpa
  namespace: vayva-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-engine
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80